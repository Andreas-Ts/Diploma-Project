[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200

lib_deps = 
	adafruit/Adafruit CCS811 Library@^1.1.3
	boschsensortec/BSEC Software Library@^1.8.1492
	bblanchon/ArduinoJson@^7.4.1

	