{% if last_reading %}
    <h2 class="sub-title">Πιο πρόσφατη εισαγωγή τιμών</h2>
    <div class="state-box last-reading">
        Temperature: {{ last_reading.temperature }} °C<br>
        Humidity: {{ last_reading.humidity }} %<br>
        Timestamp: {{ last_reading.timestamp }}
    </div>
{% else %}
    <div class="state-box last-reading" style="background: #ffe;">
        Δεν υπάρχουν προηγούμενες μετρήσεις.
    </div>
{% endif %}
