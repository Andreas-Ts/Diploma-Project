<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Main Title -->
        <h1 class="main-title">{{ page_title }}</h1>

        <!-- Description Text -->
        <p class="description">{{ description }}</p>

        <!-- Experiment State -->
        <h2 class="sub-title">Κατάσταση του πειράματος</h2>
        <div class="state-box">{{ experiment_state }}</div>

      

        <!-- Submission Button -->
        <button onclick="location.href='{{ url_for('submitEnvRoomData')}}'" class="submit-button">
            Υπόβαλε Θερμοκρασία και Υγρασία Δωματίου
        </button>
 <!-- Show last env room reading -->
        <div class="content-block">
            {% include 'showLastEnvReading.html' %}
        </div>
        
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
